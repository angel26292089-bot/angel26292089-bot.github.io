<style>
  :root {
    --ink: #1a1208;
    --paper: #f7f3ec;
    --warm: #c8a97e;
    --red: #8b2e1a;
    --gold: #b8923a;
    --muted: #7a6e60;
    --border: #d4c9b8;
    --hover: #fdf8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(200,169,126,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(139,46,26,0.07) 0%, transparent 60%);
  }

  /* Header */
  header {
    text-align: center;
    padding: 52px 24px 36px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  header::before {
    content: '';
    display: block;
    width: 1px;
    height: 40px;
    background: var(--gold);
    margin: 0 auto 20px;
  }
  .shop-name {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--ink);
  }
  .shop-sub {
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-top: 10px;
    text-transform: uppercase;
  }
  .shop-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 18px auto 0;
    max-width: 300px;
  }
  .shop-divider span { flex: 1; height: 1px; background: var(--border); }
  .shop-divider i { color: var(--gold); font-size: 10px; }

  /* Main layout */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Section title */
  .section-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .section-title::after {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--gold);
    margin: 10px auto 0;
  }

  /* Product grid */
  .product-grid {
    display: grid;
    gap: 2px;
    margin-bottom: 40px;
  }

  .product-row {
    display: grid;
    grid-template-columns: 1fr 90px 130px;
    align-items: center;
    gap: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .product-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.2s ease;
    transform-origin: center;
  }
  .product-row:hover { background: var(--hover); }
  .product-row.selected {
    background: #fdf5e8;
    border-color: var(--gold);
  }
  .product-row.selected::before { transform: scaleY(1); }

  .product-name {
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--ink);
    line-height: 1.5;
  }
  .product-price {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--gold);
    text-align: center;
  }
  .product-price span {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    color: var(--muted);
    margin-left: 2px;
  }
  .price-inquiry {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* Qty control */
  .qty-control {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }
  .qty-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    background: white;
    color: var(--ink);
    font-size: 16px;
    cursor: pointer;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
  .qty-num {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    min-width: 20px;
    text-align: center;
    color: var(--ink);
  }

  /* Order form */
  .order-form {
    background: white;
    border: 1px solid var(--border);
    padding: 32px 28px;
    margin-bottom: 28px;
  }
  .form-row {
    margin-bottom: 20px;
  }
  .form-label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    background: var(--paper);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }
  .form-input:focus { border-color: var(--gold); background: white; }
  textarea.form-input { resize: vertical; min-height: 80px; }

  /* Summary */
  .order-summary {
    background: #fdf5e8;
    border: 1px solid var(--gold);
    padding: 24px 28px;
    margin-bottom: 28px;
    display: none;
  }
  .order-summary.visible { display: block; }
  .summary-title {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .summary-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--border);
    color: var(--ink);
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--red);
    margin-top: 14px;
    padding-top: 10px;
  }
  .summary-total-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--muted);
    align-self: flex-end;
    padding-bottom: 2px;
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    letter-spacing: 0.4em;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .submit-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }
  .submit-btn:hover { background: #2d2418; }
  .submit-btn:hover::after { transform: scaleX(1); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Success overlay */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .success-overlay.show { display: flex; }
  .success-card {
    background: var(--paper);
    padding: 52px 48px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .success-icon {
    font-size: 36px;
    margin-bottom: 20px;
    display: block;
  }
  .success-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    letter-spacing: 0.3em;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .success-msg {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.9;
    letter-spacing: 0.05em;
  }
  .success-close {
    margin-top: 28px;
    padding: 12px 40px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    cursor: pointer;
  }

  /* Notice */
  .notice {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    line-height: 2;
    padding: 20px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }

  /* Category label */
  .cat-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    padding: 18px 18px 8px;
    display: block;
    text-transform: uppercase;
  }

  @media (max-width: 500px) {
    .product-row { grid-template-columns: 1fr 80px 110px; padding: 12px 12px; }
    .product-name { font-size: 13px; }
    .order-form { padding: 24px 18px; }
  }
</style>
</head>

</main>

</div>

  // 染膏 VGB系列
  { cat: "染膏 — VGB系列", name: "VGB4", price: 160 },
  { name: "VGB6", price: 160 },
  // 染膏 OGB系列
  { cat: "染膏 — OGB系列", name: "OGB4", price: 160 },
  { name: "OGB6", price: 160 },
  // 染膏 特殊色系列
  { cat: "染膏 — 特殊色系列", name: "Ash Black", price: 160 },
  { name: "Ash", price: 160 },
  { name: "Green", price: 160 },
  { name: "Violet", price: 160 },
  { name: "Red", price: 160 },
  { name: "Blue", price: 160 },
  { name: "Orange", price: 160 },
  { name: "Yellow", price: 160 },
  { name: "CL", price: 160 },
  { name: "LT", price: 160 },
  { name: "LVT", price: 160 },
  { name: "LAT", price: 160 },
];

const quantities = {};

function renderProducts() {
  const grid = document.getElementById('productGrid');
  let html = '';
  let lastCat = '';
  products.forEach((p, i) => {
    if (p.cat && p.cat !== lastCat) {
      html += `<span class="cat-label">${p.cat}</span>`;
      lastCat = p.cat;
    }
    const qty = quantities[i] || 0;
    const priceHtml = p.price
      ? `<div class="product-price">${p.price.toLocaleString()}<span>元</span></div>`
      : `<div class="price-inquiry">洽詢</div>`;
    html += `
      <div class="product-row ${qty > 0 ? 'selected' : ''}" id="row-${i}" onclick="toggleRow(${i})">
        <div class="product-name">${p.name}</div>
        ${priceHtml}
        <div class="qty-control" onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${i}, 1)">＋</button>
        </div>
      </div>`;
  });
  grid.innerHTML = html;
}

function toggleRow(i) {
  if (!quantities[i] || quantities[i] === 0) {
    quantities[i] = 1;
  } else {
    quantities[i] = 0;
  }
  renderProducts();
  updateSummary();
}

function changeQty(i, delta) {
  quantities[i] = Math.max(0, (quantities[i] || 0) + delta);
  renderProducts();
  updateSummary();
}

function updateSummary() {
  const items = products.map((p, i) => ({ ...p, qty: quantities[i] || 0 })).filter(p => p.qty > 0);
  const summary = document.getElementById('orderSummary');
  const itemsDiv = document.getElementById('summaryItems');
  const totalDiv = document.getElementById('summaryTotal');

  if (items.length === 0) {
    summary.classList.remove('visible');
    return;
  }

  summary.classList.add('visible');
  let total = 0;
  let html = '';
  items.forEach(p => {
    const sub = p.price ? p.price * p.qty : null;
    if (sub) total += sub;
    html += `<div class="summary-item">
      <span>${p.name} × ${p.qty}</span>
      <span>${sub ? sub.toLocaleString() + ' 元' : '洽詢'}</span>
    </div>`;
  });
  itemsDiv.innerHTML = html;
  totalDiv.innerHTML = `<span class="summary-total-label">合計金額</span><span>${total.toLocaleString()} 元 <small style="font-size:13px;color:var(--muted)">（洽詢品項另計）</small></span>`;
}

async function submitOrder() {
  const name = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();
  if (!name || !phone) { alert('請填寫姓名與電話'); return; }

  const items = products.map((p, i) => ({ ...p, qty: quantities[i] || 0 })).filter(p => p.qty > 0);
  if (items.length === 0) { alert('請至少選擇一項商品'); return; }

  const lineId = document.getElementById('inputLine').value.trim();
  const note = document.getElementById('inputNote').value.trim();

  let total = 0;
  let orderLines = '';
  items.forEach(p => {
    const sub = p.price ? p.price * p.qty : null;
    if (sub) total += sub;
    orderLines += `${p.name} × ${p.qty}　${sub ? sub.toLocaleString() + ' 元' : '（洽詢）'}\n`;
  });

  const totalText = total > 0 ? `${total.toLocaleString()} 元（洽詢品項另計）` : '（請洽詢）';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '傳送中…';

  try {
    await emailjs.send('service_k2vg3lyw', 'template_lylqqg7', {
      customer_name: name,
      customer_phone: phone,
      customer_line: lineId || '未填寫',
      order_items: orderLines,
      order_total: totalText,
      note: note || '無',
    });

    const msg = `<strong>${name}</strong> 您好，<br><br>您的訂單已成功送出！<br><br>我們將盡快與您確認訂單內容，請保持電話暢通。`;
    document.getElementById('successMsg').innerHTML = msg;
    document.getElementById('successOverlay').classList.add('show');
  } catch (err) {
    alert('訂單傳送失敗，請稍後再試或直接來電聯繫。');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '送　出　訂　單';
  }
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
}

renderProducts();
</script>
</body>
</html>
